<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Mental Health Companion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-wrap">

  <div class="login-logo">
    <img src="https://cdn-icons-png.flaticon.com/512/2966/2966483.png" alt="logo">
    <h1>🧠 Mental Health Companion</h1>
    <p>Your safe, anonymous space for emotional wellness</p>
  </div>

  <div class="login-card">
    <h2>Welcome 👋</h2>
    <p class="sub">Enter a nickname to get started — no account required, completely anonymous.</p>

    <input type="text" id="name" placeholder="Choose a nickname (optional)">
    <button onclick="login()">Continue →</button>

    <p class="privacy">🔒 Anonymous · No data stored externally · No sign-up</p>
  </div>

  <div class="stat-strip">
    <div class="stat-item">
      <strong>100%</strong>
      <span>Anonymous</span>
    </div>
    <div class="stat-item">
      <strong>Free</strong>
      <span>Always</span>
    </div>
    <div class="stat-item">
      <strong>Safe</strong>
      <span>Judgment-free</span>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
